<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>
  <!-- Dumbbell: left outer plate -->
  <rect x="1" y="10" width="6" height="12" rx="2" fill="#d4ff4a"/>
  <!-- Dumbbell: left inner collar -->
  <rect x="7" y="12" width="3" height="8" rx="1" fill="#d4ff4a"/>
  <!-- Dumbbell: bar -->
  <rect x="10" y="14" width="12" height="4" rx="1" fill="#d4ff4a"/>
  <!-- Dumbbell: right inner collar -->
  <rect x="22" y="12" width="3" height="8" rx="1" fill="#d4ff4a"/>
  <!-- Dumbbell: right outer plate -->
  <rect x="25" y="10" width="6" height="12" rx="2" fill="#d4ff4a"/>
</svg>
